name: Full Stack Project CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual execution from the GitHub UI

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Use CPU-only torch
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        # Pinning compatible versions to fix the NumpyMimic AttributeError
        pip install "pennylane==0.35.1" "autoray==0.6.12"
        pip install scikit-learn pylint
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        pip list

    - name: Run PyLint
      run: |
        echo "Running pylint on backend models..."
        # We allow some warnings/errors so it doesn't fail the build unnecessarily if the code isn't perfect yet
        pylint --exit-zero backend/models/

    - name: Run PyUnit (unittest)
      run: |
        echo "Running PyUnit (unittest) unit tests..."
        python -m unittest discover -s tests -p "test_*.py"

    - name: Execution Smoke Test
      run: |
        cd backend
        # Start uvicorn in the background and log output
        nohup python -m uvicorn app:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
        # Give the server plenty of time to load heavy AI models
        sleep 30
        # Check if the server is still running
        if ! ps -p $! > /dev/null; then
          echo "Server failed to start. Logs:"
          cat uvicorn.log
          exit 1
        fi
        # Verify if the API is responding
        curl -v http://127.0.0.1:8000/ || (echo "Curl failed. Logs:" && cat uvicorn.log && exit 1)
        echo "Backend successfully executed in GitHub Actions!"
